services:
  postgres:
    image: postgres:16
    container_name: ai-calendar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_calendar
      POSTGRES_USER: ai_calendar
      POSTGRES_PASSWORD: ai_calendar_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
